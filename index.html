<html>

<head>
    <style>
        .row {
            flex-direction: row;
        }

        .col {
            flex-direction: column;
        }

        .container div {
            display: flex;
            background-color: #f1f1f1;
            margin: 4px;
            padding: 4px;
            font-size: 38px;
        }

        .container input {
            display: flex;
            background-color: #f1f1f1;
            margin: 4px;
            margin-left: 4%;
            padding: 4px;
            font-size: 38px;
        }

        .container input[type="checkbox" i] {
            width: 64px;
        }

        .container input[type="radio" i] {
            width: 64px;
        }

        .container button {
            display: flex;
            background-color: #f1f1f1;
            margin: 4px;
            padding: 4px;
            font-size: 38px;
        }

        .nospacing {
            margin: 0px;
            padding: 0px;
        }
    </style>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>

    <script>
        const API_VERSION = 2;
        const color_ok = "#7ABA2D";
        const color_warn = "#F2D23D";
        const color_err = "#BA4840";
        let authorized = false;
        let currentAccount = void 0;

        function decodeJwtResponse(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function (c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            return JSON.parse(jsonPayload);
        }

        function handleCredentialResponse(response) {
            currentAccount = decodeJwtResponse(response.credential)?.email
        }

        function gapiLoaded() {
            gapi.load('client', initializeGapiClient);
        }

        function oauthSignIn() {
            if (window.location.href.includes("127.0.0.1")) {
                // No google auth on localhost
                return;
            }

            if ((localStorage.getItem('tok') || "") != "" && (localStorage.getItem('exp') || 0) > Date.now()) {
                onAuthFinished(localStorage.getItem('tok'));
                return;
            }

            // Parse query string to see if page request is coming from OAuth 2.0 server.
            var fragmentString = location.hash.substring(1);
            var params = {};
            var regex = /([^&=]+)=([^&]*)/g, m;
            while (m = regex.exec(fragmentString)) {
                params[decodeURIComponent(m[1])] = decodeURIComponent(m[2]);
            }

            if (Object.keys(params).length > 0 && params['access_token']) {
                localStorage.setItem('exp', Date.now() + (+params['expires_in']) - 240)
                localStorage.setItem('tok', JSON.stringify(params));
                onAuthFinished(JSON.stringify(params));
                return;
            }

            // Google's OAuth 2.0 endpoint for requesting an access token
            var oauth2Endpoint = 'https://accounts.google.com/o/oauth2/v2/auth';

            // Create <form> element to submit parameters to OAuth 2.0 endpoint.
            var form = document.createElement('form');
            form.setAttribute('method', 'GET'); // Send as a GET request.
            form.setAttribute('action', oauth2Endpoint);

            // Parameters to pass to OAuth 2.0 endpoint.
            var params = {
                'client_id': '943891308960-qj0asv64k0lvmnvhn5m5hobubtecft1p.apps.googleusercontent.com',
                'redirect_uri': 'https://normantaskudzma.github.io/head/',
                'response_type': 'token',
                'scope': 'https://www.googleapis.com/auth/spreadsheets',
                'include_granted_scopes': 'true',
                'state': 'pass-through value'
            };

            // Add form parameters as hidden input values.
            for (var p in params) {
                var input = document.createElement('input');
                input.setAttribute('type', 'hidden');
                input.setAttribute('name', p);
                input.setAttribute('value', params[p]);
                form.appendChild(input);
            }

            // Add form to page and submit it to open the OAuth 2.0 endpoint.
            document.body.appendChild(form);
            form.submit();
        }

        async function initializeGapiClient() {
            await gapi.client.init({
                discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
                auto_select: true
            });

            showStatus("Accesso google..", color_warn)
            oauthSignIn();
        }

        function onAuthFinished(token) {
            gapi.client.setToken(JSON.parse(token));
            authorized = true;

            showStatus("Pronto!", color_ok)
            cleanup();
        }

        async function sendEvent(event) {
            showStatus("In trasmissione..", color_warn)
            lockButtons(true)

            const metadata = `v${API_VERSION}.${(Date.now() / 1000) | 0}`;
            const eventDate = document.getElementById("date").value.split("-").reverse().join("/");
            const eventTime = document.getElementById("time").value;
            const howBad = document.getElementById("livello").querySelector("input:checked")?.value || "-";
            const painType = document.getElementById("tipo").querySelector("input:checked")?.value || "indeterminato";

            const painLocations = document.getElementById("pain_locations")
                .querySelectorAll("input")
                .values()
                .toArray()
                .filter(element => element.checked)
                .map(element => element.value)
                .join(',') || "-";

            const comments = document.getElementById("commenti").value || "-";

            try {
                const response = await gapi.client.sheets.spreadsheets.values.append({
                    spreadsheetId: "1OzjaMz48AsuwnLIZ1X8WrazhK-3b8xT9ZQZ5Nb5710g",
                    range: "Sheet1!A1",
                    insertDataOption: "INSERT_ROWS",
                    valueInputOption: "RAW",
                    values: [[metadata, currentAccount || "(unknown google account)", eventDate, eventTime, event, howBad, painType, painLocations, comments]]
                })
                console.log(response)
                showStatus("Inviato su excel!", color_ok)
                setTimeout(() => { showStatus("Pronto!", color_ok) }, 2000)
                cleanup()
            }
            catch (e) {
                console.log(e)
                showStatus(`Error! ${JSON.stringify(e.valueOf?.() || e.toString())}`, color_err)
                cleanup()
            }
        }

        function cleanup() {
            const date = new Date();
            const date_element = document.getElementById("date");
            date_element.valueAsDate = date;
            date_element.disabled = !authorized;

            const time = new Intl.DateTimeFormat('it', { hour: '2-digit', minute: '2-digit' }).format(date);
            const time_element = document.getElementById("time");
            time_element.value = time;
            time_element.disabled = !authorized;

            const level_element = document.getElementById("livello");
            level_element.querySelectorAll("input").forEach(e => e.checked = false);
            level_element.querySelectorAll("input").forEach(e => e.disabled = !authorized);

            const type_element = document.getElementById("tipo");
            type_element.querySelectorAll("input").forEach(e => e.checked = false);
            type_element.querySelector("input").checked = true;
            type_element.querySelectorAll("input").forEach(e => e.disabled = !authorized);

            const location_element = document.getElementById("pain_locations");
            location_element.querySelectorAll("input").forEach(e => e.checked = false);
            location_element.querySelectorAll("input").forEach(e => e.disabled = !authorized);

            const comment_element = document.getElementById("commenti");
            comment_element.disabled = !authorized;
            comment_element.value = "";

            lockButtons(!authorized);
        }

        function lockButtons(do_lock) {
            document.getElementById("buttonsactive").querySelectorAll("button").forEach(e => e.disabled = do_lock);
            document.getElementById("buttonspills").querySelectorAll("button").forEach(e => e.disabled = do_lock);

        }

        function showStatus(status, color) {
            const statusbar = document.getElementById("status");
            statusbar.innerText = status;
            statusbar.style.backgroundColor = color;
        }

        function reportProblem() {

        }

        function logout() {
            const access_token = localStorage.getItem('tok')
            google?.accounts?.oauth2?.revoke?.(access_token)
            localStorage.clear();
            location.reload();
        }
    </script>
</head>

<body onload="cleanup()">
    <div id="g_id_onload" data-client_id="943891308960-qj0asv64k0lvmnvhn5m5hobubtecft1p.apps.googleusercontent.com"
        data-callback="handleCredentialResponse" data-auto_select="true">
    </div>

    <div class="container col" style="height:20px; padding: 20px; font-size: 18;">
        <div id="status">Pagina in caricamento..</div>
    </div>

    <div class="container col">
        <div class="container row">
            <div>Data</div>
            <input type="date" id="date" name="date">
            <input type="time" id="time" name="time" step="3600" required />
        </div>

        <div class="container col">
            Livello di dolore
            <div id="livello">
                <input type="radio" value="lieve" name="livello" id="lieve"></input>
                <label for="lieve">Lieve</label>

                <input type="radio" value="medio" name="livello" id="medio"></input>
                <label for="medio">Medio</label>

                <input type="radio" value="forte" name="livello" id="forte"></input>
                <label for="forte">Forte</label>
            </div>
        </div>

        <div class="container col">
            Tipo di dolore
            <div id="tipo" name="tipo">
                <input type="radio" value="indeterminato" name="tipo" id="indeterminato" checked></input>
                <label for="indeterminato">Indeterminato</label>

                <input type="radio" value="micranea" name="tipo" id="micranea"></input>
                <label for="micranea">Micranea</label>

                <input type="radio" value="tensione" name="tipo" id="tensione"></input>
                <label for="tensione">Tensione</label>
            </div>

            <div class="container col">
                Locazione
                <div id="pain_locations" class="container col">
                    <div class="nospacing">
                        <input type="checkbox" id="check1" value="Testa fronte"></input>
                        <label for="check1">Testa fronte</label>
                    </div>
                    <div class="nospacing">
                        <input type="checkbox" id="check2" value="Testa top"></input>
                        <label for="check2">Testa top</label>
                    </div>
                    <div class="nospacing">
                        <input type="checkbox" id="check3" value="Tempia"></input>
                        <label for="check3">Tempia</label>
                    </div>
                    <div class="nospacing">
                        <input type="checkbox" id="check4" value="Cervicale"></input>
                        <label for="check4">Cervicale</label>
                    </div>
                    <div class="nospacing">
                        <input type="checkbox" id="check5" value="Occhi"></input>
                        <label for="check5">Occhi</label>
                    </div>
                    <div class="nospacing">
                        <input type="checkbox" id="check6" value="Sopra le occhi"></input>
                        <label for="check6">Sopra le occhi</label>
                    </div>
                    <div class="nospacing">
                        <input type="checkbox" id="check7" value="Zigomi"></input>
                        <label for="check7">Zigomi</label>
                    </div>
                    <div class="nospacing">
                        <input type="checkbox" id="check8" value="Teeth"></input>
                        <label for="check8">Teeth</label>
                    </div>
                    <div class="nospacing">
                        <input type="checkbox" id="check9" value="Bocca"></input>
                        <label for="check9">Bocca</label>
                    </div>
                </div>
            </div>

            <div>
                Commenti:
                <input type="text" id="commenti">
            </div>

            <div id="buttonsactive" class="container col">
                Mal di testa..
                <div class="container row">
                    <button type="button" onclick="sendEvent('headache')">Attivo</button>
                    <button type="button" onclick="sendEvent('headache ended')">Fino</button>
                </div>
            </div>

            <div id="buttonspills" class="container col">
                Ho preso..
                <div class="container row">
                    <button type="button" onclick="sendEvent('pill Eletriptan')">Eletriptan</button>
                    <button type="button" onclick="sendEvent('pill Indoxen')">Indoxen</button>
                    <button type="button" onclick="sendEvent('pill Tachipirina')">Tachipirina</button>
                </div>
            </div>

            <div style="height: 40px"></div>

            <div class="container row">
                <button type="button" onclick="reportProblem()">Problema?</button>
                <button type="button" onclick="logout()">Logout</button>
            </div>
        </div>

</body>

</html>
