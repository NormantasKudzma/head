<html>

<head>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>
        function onSignIn(googleUser) {
            var profile = googleUser.getBasicProfile();
            console.log('ID: ' + profile.getId()); // Do not send to your backend! Use an ID token instead.
            console.log('Name: ' + profile.getName());
            console.log('Image URL: ' + profile.getImageUrl());
            console.log('Email: ' + profile.getEmail()); // This is null if the 'email' scope is not present.
        }

        var signinChanged = function (val) {
            document.getElementById('status').innerText = val;
        };

        var userChanged = function (user) {
            console.log('User now: ', user);
            googleUser = user;
            updateGoogleUser();
            document.getElementById('curr-user-cell').innerText = JSON.stringify(user, undefined, 2);
        };

        function docLoad() {
            auth2 = gapi.auth2.getAuthInstance();
            //auth2.enableDebugLogs();
            auth2.isSignedIn.listen(signinChanged);
            auth2.currentUser.listen(userChanged);

            if (auth2.isSignedIn.get() == true) {
                auth2.signIn();
            }
        }

        function handleCredentialResponse(credential) {
            console.log(JSON.stringify(credential))
        }
    </script>
</head>

<body>
    <div id="g_id_onload" data-client_id="943891308960-qj0asv64k0lvmnvhn5m5hobubtecft1p.apps.googleusercontent.com"
        data-callback="handleCredentialResponse">
    </div>
    <div class="g_id_signin" data-type="standard" data-onsuccess="onSignIn"></div>
    <div id="status"></div>
</body>

</html>
